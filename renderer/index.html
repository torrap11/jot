<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'" />
  <title>Proactive Recall Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="search-body">
  <main class="search-shell">
    <input id="query" type="search" placeholder="Search notes..." autofocus />
    <div id="bulk-actions" class="bulk-actions hidden">
      <span id="selected-count">0 selected</span>
      <button id="delete-selected-btn" type="button" class="btn-danger">Delete selected</button>
    </div>
    <div id="results"></div>
    <section id="editor" class="hidden">
      <div class="editor-meta">
        <span id="editor-date"></span>
        <div class="editor-actions">
          <button id="copy-note-btn" type="button">Copy</button>
          <button id="delete-note-btn" type="button" class="btn-danger" title="Delete note">Delete…</button>
        </div>
      </div>
      <textarea id="editor-text"></textarea>
      <div class="link-row">
        <input
          id="app-select"
          type="text"
          placeholder="Link to app..."
          aria-label="Link note to app"
        />
        <button id="link-btn" type="button">Link</button>
      </div>
      <div id="links"></div>
    </section>
  </main>
  <script src="renderer.js"></script>
</body>
</html>
