<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:" />
  <title>Capture</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="capture-body">
  <main class="capture-shell">
    <header id="capture-drag-handle" class="capture-titlebar" title="Drag to move" aria-label="Capture"></header>
    <p id="capture-workflow-status" class="capture-workflow-status capture-workflow-status--hidden" role="status" aria-live="polite"></p>
    <textarea
      id="capture-input"
      placeholder="Type a note, or e.g. remind me to check deploy when I open Cursor — Enter saves"
      autofocus
    ></textarea>
    <div class="organize-hint-row capture-organize-hint-row">
      <label for="capture-organize-hint">AI filing context (optional)</label>
      <textarea
        id="capture-organize-hint"
        rows="1"
        placeholder="e.g. file into Research + App Ideas folders"
      ></textarea>
    </div>
    <!-- Hidden DOM stubs so capture.js doesn't crash -->
    <select id="capture-folder-select" style="display:none" aria-hidden="true"><option value="unfiled">Unfiled</option></select>
    <input id="capture-app-input" type="hidden" />
    <div id="capture-pending-images" class="capture-pending-images hidden"></div>
    <div class="capture-attach-row">
      <button id="attach-image-capture-btn" type="button">Attach image</button>
      <button id="attach-file-capture-btn" type="button">Attach file</button>
      <span class="capture-attach-hint">or paste an image (⌘V)</span>
    </div>
  </main>
  <script src="capture.js"></script>
</body>
</html>
