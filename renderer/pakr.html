<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'" />
  <title>Pakr — PakrAI Help</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .pakr-titlebar {
      -webkit-app-region: drag;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .pakr-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="pakr-titlebar">Pakr</div>
  <div class="pakr-shell">
    <div class="pakr-chat" id="pakr-chat" aria-label="Pakr conversation" aria-live="polite">
      <div class="pakr-empty" id="pakr-empty">
        Ask Pakr anything about PakrAI — shortcuts, tabs, resurfacing — or reorganize your notes.<br>
        <span class="pakr-empty-example">Examples: What does ⌘⇧R do? · Move Client A notes into Q2 and tag <code>client-a</code>.</span>
      </div>
    </div>
    <div class="pakr-confirm-row hidden" id="pakr-confirm-row">
      <span class="pakr-confirm-summary" id="pakr-confirm-summary"></span>
      <button type="button" class="pakr-confirm-btn" id="pakr-confirm-btn">Confirm</button>
      <button type="button" class="pakr-cancel-btn" id="pakr-cancel-btn">Cancel</button>
    </div>
    <div class="pakr-input-row">
      <textarea class="pakr-input" id="pakr-input" placeholder="Ask about PakrAI or reorganize notes…" rows="2" aria-label="Message to Pakr"></textarea>
      <button type="button" class="pakr-send-btn" id="pakr-send-btn">Send</button>
    </div>
  </div>
  <script src="pakr-renderer.js"></script>
</body>
</html>
