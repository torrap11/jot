<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'" />
  <title>Jot AI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .jot-ai-titlebar {
      -webkit-app-region: drag;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .jot-ai-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="jot-ai-titlebar">Jot AI</div>
  <div class="jot-ai-shell">
    <div class="jot-ai-chat" id="jot-ai-chat" aria-label="Jot AI conversation" aria-live="polite">
      <div class="jot-ai-empty" id="jot-ai-empty">
        Ask Jot AI anything about your notes — shortcuts, tabs, resurfacing — or reorganize your notes.<br>
        <span class="jot-ai-empty-example">Examples: What does ⌘⇧R do? · Move Client A notes into Q2 and tag <code>client-a</code>.</span>
      </div>
    </div>
    <div class="jot-ai-confirm-row hidden" id="jot-ai-confirm-row">
      <span class="jot-ai-confirm-summary" id="jot-ai-confirm-summary"></span>
      <button type="button" class="jot-ai-confirm-btn" id="jot-ai-confirm-btn">Confirm</button>
      <button type="button" class="jot-ai-cancel-btn" id="jot-ai-cancel-btn">Cancel</button>
    </div>
    <div class="jot-ai-input-row">
      <textarea class="jot-ai-input" id="jot-ai-input" placeholder="Ask about Jot or reorganize notes…" rows="2" aria-label="Message to Jot AI"></textarea>
      <button type="button" class="jot-ai-send-btn" id="jot-ai-send-btn">Send</button>
    </div>
  </div>
  <script src="jot-ai-renderer.js"></script>
</body>
</html>
