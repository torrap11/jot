name: Docs

on:
  push:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'crates/screenpipe-connect/src/connections/**'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'crates/screenpipe-connect/src/connections/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate Mintlify docs
        run: node docs/mintlify/validate-docs.mjs
