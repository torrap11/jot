<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jot — Voice Memory Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Trigger notification overlay (floats above everything) -->
  <div id="trigger-notification" class="hidden">
    <div id="trigger-notification-header">
      <span id="trigger-notification-icon"></span>
      <span id="trigger-notification-label"></span>
      <button id="trigger-notification-close">✕</button>
    </div>
    <div id="trigger-notification-memories"></div>
  </div>

  <!-- Agent panel (left side, always visible) -->
  <div id="agent-panel">
    <div id="agent-header">Jot Agent</div>
    <div id="agent-messages">
      <div class="agent-empty-state">
        Type a command to act on your jots.<br>
        <span class="agent-example">Example: Find all jots about X and compile into a new jot.</span><br>
        <span class="agent-example">Example: What's the shortcut for a new note?</span>
      </div>
    </div>
    <div id="agent-input-row">
      <input id="agent-input" type="text" placeholder="Ask Jot Agent…" />
      <button id="agent-send-btn">Send</button>
    </div>

    <!-- Demo trigger buttons (context simulation for hackathon demo) -->
    <div id="trigger-demo">
      <div id="trigger-demo-label">Simulate context trigger:</div>
      <div id="trigger-demo-buttons">
        <button class="trigger-btn" data-trigger="netflix_open">📺 Netflix</button>
        <button class="trigger-btn" data-trigger="spotify_open">🎵 Spotify</button>
      </div>
    </div>
  </div>

  <!-- Main pane (right side, always visible) -->
  <div id="main-pane">
    <div id="titlebar">
      <span id="title">Jot</span>
      <div id="titlebar-actions">
        <button id="voice-btn" title="Record voice memory (Cmd+Shift+J)">🎙️</button>
        <button id="folder-btn" title="Organize folders">📁</button>
        <button id="image-btn" title="Add image">📷</button>
        <button id="new-btn" title="New jot">+</button>
      </div>
    </div>

    <!-- Config status bar (shown briefly on startup or on error) -->
    <div id="config-bar" class="hidden"></div>

    <!-- Voice capture bar (shown during recording / review) -->
    <div id="voice-bar" class="hidden">
      <!-- State: recording -->
      <div id="voice-state-recording" class="hidden">
        <span class="voice-recording-dot"></span>
        <span>Listening…</span>
        <button id="voice-stop-btn">Stop</button>
      </div>
      <!-- State: processing -->
      <div id="voice-state-processing" class="hidden">
        <span class="voice-spinner">✨</span>
        <span id="voice-processing-label">Transcribing…</span>
      </div>
      <!-- State: review -->
      <div id="voice-state-review" class="hidden">
        <div class="voice-review-body">
          <div id="voice-transcript-text"></div>
          <span class="stt-badge"></span>
        </div>
        <div id="voice-review-actions">
          <button id="voice-save-btn">Save Memory</button>
          <button id="voice-dismiss-btn">Dismiss</button>
        </div>
      </div>
      <!-- State: success -->
      <div id="voice-state-success" class="hidden">
        <span>✅ Memory saved!</span>
      </div>
      <!-- State: error -->
      <div id="voice-state-error" class="hidden">
        <span id="voice-error-text"></span>
        <button id="voice-error-dismiss-btn">✕</button>
      </div>
    </div>

    <!-- Universal Voice Command bar (Cmd+M) — dictate / app control / agent -->
    <div id="voice-cmd-bar" class="hidden">
      <!-- State: recording -->
      <div id="vcmd-state-recording">
        <span class="vcmd-dot"></span>
        <span>Recording… press Space to stop</span>
        <button id="vcmd-stop-btn">Stop</button>
      </div>
      <!-- State: processing -->
      <div id="vcmd-state-processing">
        <span class="vcmd-spinner">⚡</span>
        <span id="vcmd-processing-label">Processing…</span>
      </div>
      <!-- State: confirm — review transcript before sending -->
      <div id="vcmd-state-confirm">
        <span id="vcmd-transcript-text"></span>
        <button id="vcmd-send-btn">Send ✓</button>
        <button id="vcmd-redo-btn">🎙 Redo</button>
        <button id="vcmd-close-btn">✕</button>
      </div>
      <!-- State: success (auto-dismisses after 2s) -->
      <div id="vcmd-state-success">
        <span id="vcmd-success-icon"></span>
        <span id="vcmd-success-text"></span>
      </div>
      <!-- State: error -->
      <div id="vcmd-state-error">
        <span id="vcmd-error-text"></span>
        <button id="vcmd-error-dismiss-btn">✕</button>
      </div>
    </div>

<div id="folder-bar" class="hidden">
      <button class="folder-pill active" data-folder="all">All</button>
      <button class="folder-pill" data-folder="unfiled">Unfiled</button>
      <!-- dynamic folder pills injected by JS -->
      <button id="new-folder-btn" class="folder-pill folder-pill-add" title="New folder">+</button>
      <input id="new-folder-input" class="hidden" type="text" placeholder="Folder name" maxlength="30" />
    </div>

    <div id="note-list"></div>

    <div id="folder-organize-view" class="hidden">
      <div id="folder-organize-filter"></div>
      <div id="folder-organize-add">
        <div id="folder-organize-add-row">
          <input id="folder-organize-new-input" type="text" placeholder="Folder name" maxlength="30" />
          <button id="folder-organize-new-btn">+</button>
        </div>
        <input id="folder-organize-desc-input" type="text" placeholder="Description (optional)" maxlength="100" />
      </div>
      <div id="folder-organize-content"></div>
    </div>

    <div id="editor" class="hidden">
      <textarea id="content" placeholder="Write something… (note, reminder, or “when I open X…” — the app will figure it out)"></textarea>
      <div id="image-display" class="hidden"></div>
      <div id="editor-actions">
        <button id="back-btn">Back</button>
        <select id="folder-move" class="hidden" title="Move to folder"></select>
        <button id="delete-btn">Delete</button>
      </div>
    </div>

    <!-- Jot detail view for trigger/scheduled (non-note jots) -->
    <div id="jot-detail-view" class="hidden">
      <div id="jot-detail-header">
        <span id="jot-detail-badge"></span>
        <span id="jot-detail-meta"></span>
        <button id="jot-detail-back">Back</button>
      </div>
      <div id="jot-detail-content"></div>
      <div id="jot-detail-actions"></div>
    </div>

  </div>

  <!-- Reminder notification overlay (warm amber, distinct from dark trigger notification) -->
  <div id="reminder-notification" class="hidden">
    <div id="reminder-notification-header">
      <span>⏰ Reminder</span>
      <button id="reminder-notification-close">✕</button>
    </div>
    <div id="reminder-notification-content"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
